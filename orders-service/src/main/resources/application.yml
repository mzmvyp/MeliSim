server:
  port: ${SERVER_PORT:8003}
  shutdown: graceful
  tomcat:
    threads:
      max: 200
      min-spare: 10
    accept-count: 100
    max-connections: 8192

spring:
  application:
    name: orders-service
  lifecycle:
    timeout-per-shutdown-phase: 15s
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/melisim?useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:melisim123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: melisim-orders-pool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 10000          # fail fast if pool is exhausted
      idle-timeout: 600000                # 10 min
      max-lifetime: 1800000               # 30 min — under MySQL wait_timeout
      leak-detection-threshold: 30000     # warn if a connection is held > 30s
  jpa:
    hibernate:
      ddl-auto: validate                  # Flyway owns schema
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: orders-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      max-poll-records: 100
      enable-auto-commit: false           # we ack after handling
      properties:
        partition.assignment.strategy: org.apache.kafka.clients.consumer.CooperativeStickyAssignor
        fetch.min.bytes: 1024
        fetch.max.wait.ms: 500
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 10
      compression-type: snappy
      properties:
        # Strong durability + exactly-once-ish semantics on the producer side.
        # Idempotent producer prevents duplicates from broker-side retries.
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        linger.ms: 10                     # batch window — lets pipelining kick in
        batch.size: 32768                 # 32KB batches before flushing early
        delivery.timeout.ms: 30000
    listener:
      concurrency: 3                      # 3 consumer threads per @KafkaListener
      ack-mode: BATCH

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0                    # sample 100% in dev; lower in prod
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:}

melisim:
  products-service-url: ${PRODUCTS_SERVICE_URL:http://localhost:8002}
  outbox:
    poll-interval-ms: 2000
    batch-size: 50
    max-attempts: 10
    send-timeout-seconds: 10
    retention-days: 7
    cleanup-cron: "0 0 3 * * *"

resilience4j:
  circuitbreaker:
    instances:
      products:
        registerHealthIndicator: true
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      products:
        maxAttempts: 3
        waitDuration: 200ms
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
  timelimiter:
    instances:
      products:
        timeoutDuration: 3s
  bulkhead:
    instances:
      products:
        maxConcurrentCalls: 25            # cap concurrent products calls so one slow upstream can't drain Tomcat
        maxWaitDuration: 100ms
