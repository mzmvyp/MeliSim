global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    metrics_path: /metrics
    static_configs:
      - targets: ['api-gateway:8000']

  - job_name: 'users-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['users-service:8001']

  - job_name: 'products-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['products-service:8002']

  - job_name: 'orders-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['orders-service:8003']

  - job_name: 'payments-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['payments-service:8004']

  - job_name: 'notifications-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['notifications-service:8005']

  - job_name: 'search-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['search-service:8006']

  - job_name: 'stock-monitor'
    metrics_path: /metrics
    static_configs:
      - targets: ['stock-monitor:8099']
