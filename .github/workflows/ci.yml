name: ci

on:
  push:
    branches: [main, master, develop, "feature/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-services:
    name: python — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, payments-service, notifications-service, search-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements.txt
      - name: install
        working-directory: ${{ matrix.service }}
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest-cov
      - name: lint (ruff, enforced)
        working-directory: ${{ matrix.service }}
        run: ruff check . --config ../pyproject.toml
      - name: test + coverage
        working-directory: ${{ matrix.service }}
        run: pytest -q --cov=. --cov-report=xml --cov-report=term
      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage.xml
          if-no-files-found: ignore

  users-service:
    name: java — users-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: test
        working-directory: users-service
        run: mvn -B -q test

  orders-service:
    name: kotlin — orders-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v3
      - name: test
        working-directory: orders-service
        run: chmod +x ./gradlew && ./gradlew test --no-daemon

  go-services:
    name: go — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [products-service, stock-monitor]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ${{ matrix.service }}/go.sum
      - name: tidy
        working-directory: ${{ matrix.service }}
        run: go mod tidy
      - name: lint (golangci-lint)
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.56
          working-directory: ${{ matrix.service }}
          args: --timeout=5m
        continue-on-error: true
      - name: build
        working-directory: ${{ matrix.service }}
        run: go build ./...
      - name: test
        working-directory: ${{ matrix.service }}
        run: go test -v -race -coverprofile=coverage.out ./...
      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage.out
          if-no-files-found: ignore

  compose-sanity:
    name: docker-compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: validate compose
        run: docker compose config -q

  security-scan:
    name: trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.19.0
        with:
          scan-type: fs
          scan-ref: .
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          format: table
          exit-code: "1"
          trivyignores: ".trivyignore"

  security-config:
    name: trivy config scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.19.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: "0"
