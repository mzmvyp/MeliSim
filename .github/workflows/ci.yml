name: ci

on:
  push:
    branches: [main, master, develop, "feature/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-services:
    name: python — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, payments-service, notifications-service, search-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ matrix.service }}/requirements.txt
      - name: install
        working-directory: ${{ matrix.service }}
        run: pip install --upgrade pip && pip install -r requirements.txt
      - name: test
        working-directory: ${{ matrix.service }}
        run: pytest -q

  users-service:
    name: java — users-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: test
        working-directory: users-service
        run: mvn -B -q test

  orders-service:
    name: kotlin — orders-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v3
      - name: test
        working-directory: orders-service
        run: gradle --no-daemon test

  go-services:
    name: go — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [products-service, stock-monitor]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ${{ matrix.service }}/go.sum
      - name: tidy
        working-directory: ${{ matrix.service }}
        run: go mod tidy
      - name: build
        working-directory: ${{ matrix.service }}
        run: go build ./...
      - name: test
        working-directory: ${{ matrix.service }}
        run: go test ./...

  compose-sanity:
    name: docker-compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: validate compose
        run: docker compose config -q
