server:
  port: ${SERVER_PORT:8001}
  shutdown: graceful

spring:
  application:
    name: users-service
  lifecycle:
    timeout-per-shutdown-phase: 15s
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/melisim?useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:melisim123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:}

melisim:
  jwt:
    secret: ${JWT_SECRET:melisim-dev-secret-must-be-at-least-32-chars-long}
    expiration-minutes: 60
